<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동명쇼바 (D.M.S) - 공식 홈페이지 포털</title>
    <meta name="description" content="동명쇼바 공식 홈페이지 포털입니다. 스마트스토어, 블로그, 유튜브, 매장 위치 정보를 한눈에 확인하세요.">
    <meta name="naver-site-verification" content="1a915861537fa7cfb93060a7c6b825395f0a65cb" />
    
    <style>
        /* 초기화 및 기본 스타일 */
        body, html { margin: 0; padding: 0; width: 100%; min-height: 100%; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background-color: #121212; color: #fff; display: flex; flex-direction: column; align-items: center; }
        ul { list-style: none; padding: 0; margin: 0; }
        a { text-decoration: none; color: inherit; display: block; }

        /* 포털 메인 컨테이너 */
        .portal-container {
            width: 95%;
            max-width: 1200px; /* 이미지가 커졌으므로 전체 폭 확대 */
            text-align: center;
            padding: 60px 20px;
        }

        /* 헤더 섹션 */
        header { margin-bottom: 80px; }
        .main-title { font-size: 36px; font-weight: 800; letter-spacing: -1px; margin-bottom: 15px; color: #f5f5f5; }
        .sub-title { font-size: 18px; color: #888; font-weight: 300; }

        /* 카드 그리드 레이아웃 */
        .portal-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px; /* 카드 간격 확대 */
        }

        /* 개별 링크 카드 스타일 */
        .portal-card {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 30px;
            padding: 60px 30px;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .portal-card:hover {
            transform: translateY(-15px);
            border-color: #0078d7;
            box-shadow: 0 20px 40px rgba(0, 120, 215, 0.25);
            background: #252525;
        }

        /* 아이콘 이미지 설정 - 기존 90px에서 약 4배인 360px로 확대 */
        .portal-card img {
            width: 360px;
            height: 360px;
            max-width: 100%; /* 화면보다 커지는 것 방지 */
            object-fit: contain;
            margin-bottom: 35px;
            /* 이미지가 없을 때를 대비한 기본 스타일 */
            background-color: #2a2a2a;
            border-radius: 50%;
            padding: 15px;
            transition: transform 0.4s ease;
        }

        .portal-card:hover img {
            transform: scale(1.05); /* 마우스 올렸을 때 이미지 살짝 확대 */
        }

        .portal-card h2 {
            font-size: 28px; /* 제목 크기 확대 */
            margin: 0;
            font-weight: 700;
            color: #fff;
        }

        .portal-card p {
            font-size: 18px; /* 설명 크기 확대 */
            color: #aaa;
            margin-top: 15px;
        }

        /* 하단 정보 섹션 */
        footer {
            margin-top: 100px;
            font-size: 15px;
            color: #666;
            line-height: 1.8;
            border-top: 1px solid #222;
            padding-top: 40px;
            width: 100%;
            text-align: center;
            padding-bottom: 60px;
        }

        /* 모바일 대응 */
        @media (max-width: 900px) {
            .portal-grid { grid-template-columns: 1fr; } /* 태블릿/모바일 1줄 */
            .portal-card img { width: 280px; height: 280px; } /* 모바일에서는 소폭 축소 */
            .main-title { font-size: 28px; }
        }
    </style>
</head>
<body>

<div class="portal-container">
    <header>
        <h1 class="main-title">동명쇼바 공식 홈페이지 포털입니다</h1>
        <p class="sub-title">Performance Shock Absorber Specialist / Since 1996</p>
    </header>

    <div class="portal-grid">
        <a href="https://map.naver.com/p/entry/place/13451467?placePath=%252Fhome%253Fentry%253Dplt&searchType=place&lng=127.0785701&lat=37.5685013" target="_blank">
            <div class="portal-card">
                <img src="logo_place.jpg" alt="오시는 길">
                <h2>오시는 길</h2>
                <p>본사 매장 및 장착점 위치 안내</p>
            </div>
        </a>

        <a href="https://smartstore.naver.com/dmtec" target="_blank">
            <div class="portal-card">
                <img src="store_logo.jpg" alt="쇼핑몰 바로가기">
                <h2>온라인 쇼핑몰</h2>
                <p>빌스타인, 먼로, 가야바 등 제품 구매</p>
            </div>
        </a>

        <a href="https://blog.naver.com/bilsteinkorea" target="_blank">
            <div class="portal-card">
                <img src="blog_logo.jpg" alt="블로그 바로가기">
                <h2>공식 블로그</h2>
                <p>전문가의 작업 후기 및 튜닝 정보</p>
            </div>
        </a>

        <a href="https://www.youtube.com/@%EB%8F%99%EB%AA%85%EC%87%BC%EB%B0%94DMS" target="_blank">
            <div class="portal-card">
                <img src="youtube_logo.jpg" alt="유튜브 바로가기">
                <h2>유튜브 채널</h2>
                <p>실시간 장착 영상 및 제품 리뷰 확인</p>
            </div>
        </a>
    </div>

    <footer>
        <strong>(주)동명쇼바 (D.M.S)</strong><br>
        본사: 서울특별시 동대문구 천호대로 405 | TEL: 02-2215-0505<br>
        Copyright © 2026 D.M.S All Rights Reserved.
    </footer>
</div>

</body>
</html>
