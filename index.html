<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>동명쇼바 (D.M.S) - 공식 홈페이지 포털</title>
    <meta name="description" content="동명쇼바 공식 홈페이지 포털입니다. 스마트스토어, 블로그, 유튜브, 매장 위치 정보를 한눈에 확인하세요.">
    <meta name="naver-site-verification" content="1a915861537fa7cfb93060a7c6b825395f0a65cb" />
    
    <style>
        /* 기본 스타일 */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background-color: #0f0f0f; color: #fff; overflow-x: hidden; }
        a { text-decoration: none; color: inherit; }

        /* 배경 레이아웃 */
        .portal-wrapper {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('https://images.unsplash.com/photo-1492144534655-ae79c964c9d7?auto=format&fit=crop&q=80&w=1920') no-repeat center center/cover;
        }

        /* 헤더 문구 */
        header { text-align: center; margin-bottom: 50px; }
        .logo-main { width: 180px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }
        h1 { font-size: 28px; font-weight: 700; letter-spacing: -1px; margin: 0; color: #f2f2f2; }
        p.subtitle { font-size: 16px; color: #aaa; margin-top: 10px; font-weight: 300; }

        /* 포털 그리드 레이아웃 */
        .portal-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
            width: 90%;
            max-width: 800px;
        }

        /* 개별 포털 카드 */
        .portal-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            backdrop-filter: blur(10px);
        }

        .portal-card:hover {
            transform: translateY(-10px);
            background: rgba(255, 255, 255, 0.1);
            border-color: #0078d7;
            box-shadow: 0 15px 30px rgba(0, 120, 215, 0.3);
        }

        .portal-card img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 20px;
            filter: grayscale(20%);
        }

        .portal-card:hover img {
            filter: grayscale(0%);
        }

        .portal-card h2 { font-size: 18px; margin: 0; font-weight: 600; }
        .portal-card span { display: block; font-size: 13px; color: #888; margin-top: 8px; }

        /* 하단 푸터 */
        footer { margin-top: 60px; text-align: center; font-size: 12px; color: #666; line-height: 1.6; }

        /* 반응형 설정 */
        @media (max-width: 600px) {
            .portal-grid { grid-template-columns: 1fr; }
            h1 { font-size: 22px; }
        }
    </style>
</head>
<body>

<div class="portal-wrapper">
    <header>
